<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Absensi Pegawai - Bawaslu Riau</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
        }
        .conditional-section {
            transition: all 0.3s ease-in-out;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
        }
        .conditional-section.visible {
            max-height: 1200px;
            opacity: 1;
            margin-top: 1.5rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-fade-in { 
            animation: fadeIn 0.3s ease-out forwards; 
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header Aplikasi -->
    <header class="bg-gradient-to-r from-orange-500 to-orange-600 text-white shadow-lg">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-5">
            <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-center">
                Aplikasi Laporan Absensi Pegawai Bawaslu Riau
            </h1>
            <p class="text-center text-sm text-orange-100 mt-1">Sistem Pelaporan Mandiri Terintegrasi</p>
        </div>
    </header>

    <!-- Konten Utama -->
    <main class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-6 sm:p-8">
            <form id="absensiForm" class="space-y-6">
                
                <!-- 1. Pilihan nama Kabupaten / Kota / Wilayah Tugas (POSISI PALING ATAS) -->
                <div>
                    <label for="kabupatenKota" class="block text-sm font-medium text-gray-700 mb-1">Kabupaten / Kota / Wilayah Tugas</label>
                    <select id="kabupatenKota" name="kabupatenKota" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500 transition duration-150 bg-white">
                        <option value="" disabled selected>-- Pilih Kabupaten/Kota/Wilayah --</option>
                        <option value="Provinsi Riau">Provinsi Riau</option>
                        <option value="Kota Pekanbaru">Kota Pekanbaru</option>
                        <option value="Kota Dumai">Kota Dumai</option>
                        <option value="Kabupaten Bengkalis">Kabupaten Bengkalis</option>
                        <option value="Kabupaten Indragiri Hilir">Kabupaten Indragiri Hilir</option>
                        <option value="Kabupaten Indragiri Hulu">Kabupaten Indragiri Hulu</option>
                        <option value="Kabupaten Kampar">Kabupaten Kampar</option>
                        <option value="Kabupaten Kepulauan Meranti">Kabupaten Kepulauan Meranti</option>
                        <option value="Kabupaten Kuantan Singingi">Kabupaten Kuantan Singingi</option>
                        <option value="Kabupaten Pelalawan">Kabupaten Pelalawan</option>
                        <option value="Kabupaten Rokan Hilir">Kabupaten Rokan Hilir</option>
                        <option value="Kabupaten Rokan Hulu">Kabupaten Rokan Hulu</option>
                        <option value="Kabupaten Siak">Kabupaten Siak</option>
                    </select>
                </div>

                <!-- 2. Nama Pegawai (Dropdown Dinamis) -->
                <div>
                    <label for="namaPegawai" class="block text-sm font-medium text-gray-700 mb-1">Nama Pegawai</label>
                    <select id="namaPegawai" name="namaPegawai" required disabled class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500 transition duration-150 bg-gray-50 cursor-not-allowed">
                        <option value="" disabled selected>-- Pilih Kabupaten/Kota Terlebih Dahulu --</option>
                    </select>
                </div>

                <!-- 3. Jenis Laporan Absensi -->
                <div>
                    <label for="presensi" class="block text-sm font-medium text-gray-700 mb-1">Jenis Laporan Absensi</label>
                    <select id="presensi" name="presensi" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500 transition duration-150 bg-white">
                        <option value="" disabled selected>-- Pilih Jenis Laporan --</option>
                        <option value="lupa-absensi">Lupa Absensi</option>
                        <option value="izin">Izin</option>
                        <option value="kendala-mesin">Kendala Mesin Absensi</option>
                        <option value="dinas-luar">Dinas Luar</option>
                        <option value="WFH">Work From Anywhere (WFH)</option>
                    </select>
                </div>

                <!-- 4. Kondisional Section: Lupa Absensi -->
                <div id="lupaAbsenSection" class="conditional-section space-y-4">
                    <div>
                        <label for="tanggalLupaAbsen" class="block text-sm font-medium text-gray-700 mb-1">Tanggal</label>
                        <input type="date" id="tanggalLupaAbsen" name="tanggal" class="date-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500">
                    </div>
                    <div>
                        <label for="dokumenLupaAbsen" class="block text-sm font-medium text-gray-700 mb-1">Upload Dokumen Pendukung</label>
                        <input type="file" id="dokumenLupaAbsen" name="dokumen" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100">
                    </div>
                </div>
                
                <!-- 5. Kondisional Section: Kendala Mesin Absensi -->
                <div id="kendalaMesinSection" class="conditional-section space-y-4">
                    <div>
                        <label for="deskripsiKendala" class="block text-sm font-medium text-gray-700 mb-1">Deskripsi Kendala</label>
                        <textarea id="deskripsiKendala" name="deskripsiKendala" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500" placeholder="Jelaskan kendala mesin absensi yang Anda alami..."></textarea>
                    </div>
                    <div>
                        <label for="tanggalKendala" class="block text-sm font-medium text-gray-700 mb-1">Tanggal Kendala</label>
                        <input type="date" id="tanggalKendala" name="tanggal" class="date-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500">
                    </div>
                    <div>
                        <label for="dokumenKendala" class="block text-sm font-medium text-gray-700 mb-1">Upload Foto/Video Bukti Kendala</label>
                        <input type="file" id="dokumenKendala" name="dokumen" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100">
                    </div>
                </div>

                <!-- 6. Kondisional Section: WFH -->
                <div id="WFHSection" class="conditional-section space-y-4">
                    <div>
                        <label for="WFHPilihan" class="block text-sm font-medium text-gray-700 mb-1">Pilihan Absensi WFH</label>
                        <select id="WFHPilihan" name="WFHPilihan" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500 bg-white">
                            <option value="" disabled selected>-- Pilih Absensi WFH --</option>
                            <option value="absensi-masuk">Absensi Masuk</option>
                            <option value="absensi-pulang">Absensi Pulang</option>
                        </select>
                    </div>
                    
                    <div id="WFHMasukSection" class="conditional-section space-y-4">
                        <div>
                            <label for="rencanaKerja" class="block text-sm font-medium text-gray-700 mb-1">Silakan Rencana Kerja Hari Ini</label>
                            <textarea id="rencanaKerja" name="keterangan" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500" placeholder="Tuliskan rencana kerja mandiri Anda hari ini..."></textarea>
                        </div>
                        <div>
                            <label for="tanggalWFHMasuk" class="block text-sm font-medium text-gray-700 mb-1">Tanggal</label>
                            <input type="date" id="tanggalWFHMasuk" name="tanggal" class="date-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500">
                        </div>
                    </div>
                    
                    <div id="WFHPulangSection" class="conditional-section space-y-4">
                        <div>
                            <label for="pencapaianKerja" class="block text-sm font-medium text-gray-700 mb-1">Pencapaian Target Kerja Hari Ini</label>
                            <textarea id="pencapaianKerja" name="keterangan" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500" placeholder="Tuliskan realisasi atau pencapaian target kerja hari ini..."></textarea>
                        </div>
                        <div>
                            <label for="tanggalWFHPulang" class="block text-sm font-medium text-gray-700 mb-1">Tanggal</label>
                            <input type="date" id="tanggalWFHPulang" name="tanggal" class="date-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500">
                        </div>
                    </div>
                </div>

                <!-- 7. Kondisional Section: Dinas Luar -->
                <div id="dinasLuarSection" class="conditional-section space-y-4">
                    <div>
                        <label for="kotaTujuan" class="block text-sm font-medium text-gray-700 mb-1">Kota Tujuan</label>
                        <input type="text" id="kotaTujuan" name="kotaTujuan" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500" placeholder="Contoh: Pekanbaru, Jakarta, Siak">
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="tanggalPergi" class="block text-sm font-medium text-gray-700 mb-1">Tanggal Pergi</label>
                            <input type="date" id="tanggalPergi" name="tanggalPergi" class="date-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500">
                        </div>
                        <div>
                            <label for="tanggalPulang" class="block text-sm font-medium text-gray-700 mb-1">Tanggal Pulang</label>
                            <input type="date" id="tanggalPulang" name="tanggalPulang" class="date-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500">
                        </div>
                    </div>
                    <div id="jumlahHariDinas" class="text-sm font-medium text-gray-800 bg-orange-50 border border-orange-100 p-3 rounded-lg text-center shadow-inner">
                        Jumlah Hari Dinas: <span class="text-orange-600 font-bold">0</span> Hari
                    </div>
                    <div>
                        <label for="dokumenDinas" class="block text-sm font-medium text-gray-700 mb-1">Upload Surat Tugas / Dokumen Pendukung</label>
                        <input type="file" id="dokumenDinas" name="dokumen" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100">
                    </div>
                </div>

                <!-- 8. Kondisional Section: Izin -->
                <div id="izinSection" class="conditional-section space-y-4">
                    <div>
                        <label for="perihalIzin" class="block text-sm font-medium text-gray-700 mb-1">Perihal Izin</label>
                        <textarea id="perihalIzin" name="perihalIzin" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500" placeholder="Contoh: Sakit (dengan surat dokter), Kepentingan keluarga mendesak"></textarea>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="tanggalMulaiIzin" class="block text-sm font-medium text-gray-700 mb-1">Tanggal Mulai Izin</label>
                            <input type="date" id="tanggalMulaiIzin" name="tanggal" class="date-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500">
                        </div>
                        <div>
                            <label for="tanggalAkhirIzin" class="block text-sm font-medium text-gray-700 mb-1">Tanggal Akhir Izin</label>
                            <input type="date" id="tanggalAkhirIzin" name="tanggalAkhirIzin" class="date-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500">
                        </div>
                    </div>
                    <div id="jumlahHariIzin" class="text-sm font-medium text-gray-800 bg-orange-50 border border-orange-100 p-3 rounded-lg text-center shadow-inner">
                        Jumlah Hari Izin: <span class="text-orange-600 font-bold">0</span> Hari
                    </div>
                    <div>
                        <label for="dokumenIzin" class="block text-sm font-medium text-gray-700 mb-1">Upload File / Surat Keterangan / Bukti Izin</label>
                        <input type="file" id="dokumenIzin" name="dokumen" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100">
                    </div>
                </div>

                <!-- Tombol Submit -->
                <div class="pt-4">
                    <button type="submit" id="submitButton" class="w-full flex justify-center items-center px-6 py-3.5 border border-transparent text-base font-semibold rounded-lg text-white bg-orange-600 hover:bg-orange-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transition duration-150 disabled:bg-orange-300">
                        <span id="buttonText">Kirim Laporan</span>
                        <svg id="loadingSpinner" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Popup / Modal Sukses -->
    <div id="successModal" class="fixed inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center modal-fade-in">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-4">
                <svg class="h-10 w-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h3 class="text-xl font-bold text-gray-900">Laporan Diterima</h3>
            <p id="modalMessage" class="text-gray-600 mt-2 text-sm leading-relaxed">
                Laporan absensi atas nama <span id="successPegawaiName" class="font-bold text-gray-800">Pegawai</span> sudah diterima.
            </p>
            <button id="closeModal" class="mt-6 w-full px-4 py-2.5 bg-orange-600 text-white font-medium rounded-lg hover:bg-orange-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transition duration-150">
                Tutup
            </button>
        </div>
    </div>

            const form = document.getElementById('absensiForm');
            const namaPegawaiSelect = document.getElementById('namaPegawai');
            const kabupatenKotaSelect = document.getElementById('kabupatenKota');
            const presensiSelect = document.getElementById('presensi');
            const WFHPilihanSelect = document.getElementById('WFHPilihan');
            
            const sections = {
                lupaAbsen: document.getElementById('lupaAbsenSection'),
                kendalaMesin: document.getElementById('kendalaMesinSection'),
                izin: document.getElementById('izinSection'),
                WFH: document.getElementById('WFHSection'),
                WFHMasuk: document.getElementById('WFHMasukSection'),
                WFHPulang: document.getElementById('WFHPulangSection'),
                dinasLuar: document.getElementById('dinasLuarSection')
            };

            const submitButton = document.getElementById('submitButton');
            const buttonText = document.getElementById('buttonText');
            const loadingSpinner = document.getElementById('loadingSpinner');

            const successModal = document.getElementById('successModal');
            const successPegawaiName = document.getElementById('successPegawaiName');
            const closeModalButton = document.getElementById('closeModal');
            
            const tglPergi = document.getElementById('tanggalPergi');
            const tglPulang = document.getElementById('tanggalPulang');
            const jumlahHariDinas = document.getElementById('jumlahHariDinas');
            
            const tglMulaiIzin = document.getElementById('tanggalMulaiIzin');
            const tglAkhirIzin = document.getElementById('tanggalAkhirIzin');
            const jumlahHariIzin = document.getElementById('jumlahHariIzin');

            // --- STREAMING_CHUNK:Configuring dynamic selection changes for employees... ---
            // Event listener saat Kabupaten / Kota dipilih
            kabupatenKotaSelect.addEventListener('change', function () {
                const wilayahTerpilih = this.value;
                
                // Kosongkan nama pegawai sebelumnya
                namaPegawaiSelect.innerHTML = '<option value="" disabled selected>-- Pilih Nama Pegawai --</option>';
                
                if (wilayahTerpilih && dataPegawaiPerWilayah[wilayahTerpilih]) {
                    // Aktifkan kembali input nama pegawai
                    namaPegawaiSelect.disabled = false;
                    namaPegawaiSelect.classList.remove('bg-gray-50', 'cursor-not-allowed');
                    namaPegawaiSelect.classList.add('bg-white');
                    
                    // Masukkan data pegawai sesuai wilayah
                    dataPegawaiPerWilayah[wilayahTerpilih].forEach(pegawai => {
                        const option = document.createElement('option');
                        option.value = pegawai;
                        option.textContent = pegawai;
                        namaPegawaiSelect.appendChild(option);
                    });
                } else {
                    // Jika tidak memilih wilayah valid, disable lagi
                    namaPegawaiSelect.disabled = true;
                    namaPegawaiSelect.classList.add('bg-gray-50', 'cursor-not-allowed');
                    namaPegawaiSelect.classList.remove('bg-white');
                }
            });

            // Kunci tanggal mundur untuk Kendala Mesin Absensi dan WFH
            function setMinDateForInputs() {
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const todayString = `${yyyy}-${mm}-${dd}`;
                
                document.querySelectorAll('.date-input').forEach(input => {
                    input.setAttribute('min', todayString);
                });
            }

            // Fungsi kalkulasi selisih hari
            function calculateDays(start, end) {
                if (!start || !end) return 0;
                const startDate = new Date(start);
                const endDate = new Date(end);
                if (startDate > endDate) return 0;
                
                const diffTime = Math.abs(endDate - startDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; // Termasuk hari awal
                return diffDays;
            }

            // Monitor perubahan tanggal dinas luar
            [tglPergi, tglPulang].forEach(el => el.addEventListener('change', () => {
                const days = calculateDays(tglPergi.value, tglPulang.value);
                jumlahHariDinas.innerHTML = `Jumlah Hari Dinas: <span class="text-orange-600 font-bold">${days}</span> Hari`;
            }));

            // Monitor perubahan tanggal izin
            [tglMulaiIzin, tglAkhirIzin].forEach(el => el.addEventListener('change', () => {
                const days = calculateDays(tglMulaiIzin.value, tglAkhirIzin.value);
                jumlahHariIzin.innerHTML = `Jumlah Hari Izin: <span class="text-orange-600 font-bold">${days}</span> Hari`;
            }));

            function hideAllSections() {
                Object.values(sections).forEach(section => section.classList.remove('visible'));
            }
            
            function hideWFHSubSections() {
                sections.WFHMasuk.classList.remove('visible');
                sections.WFHPulang.classList.remove('visible');
            }

            // --- STREAMING_CHUNK:Configuring conditional dynamic form sections... ---
            // Logika Dropdown Pilihan Presensi Utama
            presensiSelect.addEventListener('change', function () {
                hideAllSections();
                
                // Atur ulang batasan tanggal mundur untuk seluruh form terlebih dahulu
                setMinDateForInputs();
                
                const selectedValue = this.value;

                switch (selectedValue) {
                    case 'lupa-absensi':
                        sections.lupaAbsen.classList.add('visible');
                        // Lupa Absensi dibebaskan dari pembatasan tanggal mundur
                        document.getElementById('tanggalLupaAbsen').removeAttribute('min');
                        break;
                    case 'kendala-mesin':
                        sections.kendalaMesin.classList.add('visible');
                        // Kendala Mesin wajib dikunci tanggal mundurnya
                        break;
                    case 'izin':
                        sections.izin.classList.add('visible');
                        // Izin dibebaskan dari pembatasan tanggal mundur
                        document.getElementById('tanggalMulaiIzin').removeAttribute('min');
                        document.getElementById('tanggalAkhirIzin').removeAttribute('min');
                        break;
                    case 'WFH':
                        sections.WFH.classList.add('visible');
                        WFHPilihanSelect.value = '';
                        hideWFHSubSections();
                        // WFH wajib dikunci tanggal mundurnya
                        break;
                    case 'dinas-luar':
                        sections.dinasLuar.classList.add('visible');
                        // Dinas Luar dibebaskan dari pembatasan tanggal mundur
                        document.getElementById('tanggalPergi').removeAttribute('min');
                        document.getElementById('tanggalPulang').removeAttribute('min');
                        break;
                }
            });

            // Logika Dropdown Sub WFH
            WFHPilihanSelect.addEventListener('change', function () {
                hideWFHSubSections();
                if (this.value === 'absensi-masuk') {
                    sections.WFHMasuk.classList.add('visible');
                } else if (this.value === 'absensi-pulang') {
                    sections.WFHPulang.classList.add('visible');
                }
            });

            // --- STREAMING_CHUNK:Handling form submission and file base64 encoding... ---
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                
                submitButton.disabled = true;
                buttonText.textContent = 'Memproses berkas...';
                loadingSpinner.classList.remove('hidden');

                const fileInputs = {
                    'lupa-absensi': document.getElementById('dokumenLupaAbsen'),
                    'kendala-mesin': document.getElementById('dokumenKendala'),
                    'izin': document.getElementById('dokumenIzin'),
                    'dinas-luar': document.getElementById('dokumenDinas'),
                };
                
                const presensiValue = presensiSelect.value;
                const fileInput = fileInputs[presensiValue];
                
                if (fileInput && fileInput.files[0]) {
                    const file = fileInput.files[0];
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => {
                        const fileData = {
                            base64: reader.result.split(',')[1],
                            type: file.type,
                            name: file.name
                        };
                        sendData(fileData);
                    };
                    reader.onerror = (error) => {
                        console.error('Error reading file:', error);
                        resetButton();
                    };
                } else {
                    sendData(null);
                }
            });

            // --- STREAMING_CHUNK:Dispatching data payload to Google Sheet API... ---
            function sendData(fileObject) {
                buttonText.textContent = 'Mengirim Laporan...';
                
                const data = {
                    namaPegawai: namaPegawaiSelect.value,
                    kabupatenKota: kabupatenKotaSelect.value,
                    presensi: presensiSelect.value
                };

                switch (data.presensi) {
                    case 'lupa-absensi':
                        data.tanggal = document.getElementById('tanggalLupaAbsen').value;
                        break;
                    case 'kendala-mesin':
                        data.deskripsiKendala = document.getElementById('deskripsiKendala').value;
                        data.tanggal = document.getElementById('tanggalKendala').value;
                        break;
                    case 'izin':
                        data.perihalIzin = document.getElementById('perihalIzin').value;
                        data.tanggal = document.getElementById('tanggalMulaiIzin').value;
                        data.tanggalAkhirIzin = document.getElementById('tanggalAkhirIzin').value;
                        data.jumlahHari = calculateDays(data.tanggal, data.tanggalAkhirIzin);
                        break;
                    case 'WFH':
                        data.WFHPilihan = WFHPilihanSelect.value;
                        if (data.WFHPilihan === 'absensi-masuk') {
                            data.keterangan = document.getElementById('rencanaKerja').value;
                            data.tanggal = document.getElementById('tanggalWFHMasuk').value;
                        } else if (data.WFHPilihan === 'absensi-pulang') {
                            data.keterangan = document.getElementById('pencapaianKerja').value;
                            data.tanggal = document.getElementById('tanggalWFHPulang').value;
                        }
                        break;
                    case 'dinas-luar':
                        data.kotaTujuan = document.getElementById('kotaTujuan').value;
                        data.tanggalPergi = document.getElementById('tanggalPergi').value;
                        data.tanggalPulang = document.getElementById('tanggalPulang').value;
                        data.jumlahHari = calculateDays(data.tanggalPergi, data.tanggalPulang);
                        break;
                }

                if (fileObject) {
                    data.file = fileObject;
                }

                // URL Web App dari Google Apps Script
                const scriptURL = 'https://script.google.com/macros/s/AKfycbw7D1IlGky4oP12tB7IN0nQ_z-iQZ9TR_QIIEWAixtwe-puOX4WXS6nwe_uHCMAFiOlcA/exec';

                fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(data)
                })
                .then(response => {
                    console.log('Success sending form data:', response);
                    
                    // Tampilkan nama pegawai di popup sukses secara dinamis
                    successPegawaiName.textContent = data.namaPegawai;
                    successModal.classList.remove('hidden');
                    
                    // Reset form & sembunyikan semua section kondisional
                    form.reset();
                    
                    // Reset dropdown nama pegawai agar kembali disable
                    namaPegawaiSelect.innerHTML = '<option value="" disabled selected>-- Pilih Kabupaten/Kota Terlebih Dahulu --</option>';
                    namaPegawaiSelect.disabled = true;
                    namaPegawaiSelect.classList.add('bg-gray-50', 'cursor-not-allowed');
                    namaPegawaiSelect.classList.remove('bg-white');

                    hideAllSections();
                    hideWFHSubSections();
                    
                    // Setel ulang label jumlah hari
                    jumlahHariDinas.innerHTML = `Jumlah Hari Dinas: <span class="text-orange-600 font-bold">0</span> Hari`;
                    jumlahHariIzin.innerHTML = `Jumlah Hari Izin: <span class="text-orange-600 font-bold">0</span> Hari`;
                    
                    resetButton();
                })
                .catch(error => {
                    console.error('Error sending form data:', error);
                    resetButton();
                });
            }

            function resetButton() {
                submitButton.disabled = false;
                buttonText.textContent = 'Kirim Laporan';
                loadingSpinner.classList.add('hidden');
            }

            function hideModal() {
                successModal.classList.add('hidden');
            }
            closeModalButton.addEventListener('click', hideModal);
            successModal.addEventListener('click', function(e) {
                if (e.target === this) {
                    hideModal();
                }
            });
            
            // Inisialisasi awal penguncian tanggal mundur
            setMinDateForInputs();
        });
    </script>
